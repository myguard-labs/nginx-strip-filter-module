name: Build and Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.1"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validation:
    name: Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck shellcheck

      - name: Validate scripts and source
        run: |
          bash -n tools/ci-build.sh
          shellcheck tools/ci-build.sh
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=normalCheckLevelMaxBranches \
            --suppress=unusedFunction \
            strip_core.c \
            ngx_http_strip_filter_module.c
          git diff --check

      - name: Lint workflows
        run: |
          version=1.7.7
          base="https://github.com/rhysd/actionlint/releases/download/v${version}"
          tarball="actionlint_${version}_linux_amd64.tar.gz"
          curl -fsSL -o /tmp/actionlint.tgz "${base}/${tarball}"
          curl -fsSL -o /tmp/actionlint.checksums \
            "${base}/actionlint_${version}_checksums.txt"
          ( cd /tmp && grep " ${tarball}\$" actionlint.checksums \
              | sed 's#'"${tarball}"'#actionlint.tgz#' | sha256sum -c - )
          tar -xzf /tmp/actionlint.tgz -C /tmp actionlint
          /tmp/actionlint -color .github/workflows/*.yml

  build:
    name: Build (${{ matrix.flavor }} ${{ matrix.version }} / ${{ matrix.cc }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: nginx
            version: "1.31.1"
            cc: gcc
            primary: true
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang curl libpcre2-dev zlib1g-dev

      - name: Cache source tarball
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .build/${{ matrix.flavor }}-${{ matrix.version }}.tar.gz
          key: src-${{ matrix.flavor }}-${{ matrix.version }}

      - name: Build server and dynamic module
        env:
          CC: ${{ matrix.cc }}
        run: |
          bash tools/ci-build.sh "${{ matrix.flavor }}" "${{ matrix.version }}"
          build=".build/${{ matrix.flavor }}-${{ matrix.version }}/objs"
          test -f "$build/ngx_http_strip_filter_module.so"

      - name: Strict module compile
        run: |
          build=".build/${{ matrix.flavor }}-${{ matrix.version }}"
          cflags=$(awk '/^CFLAGS[[:space:]]*=/{sub(/^CFLAGS[[:space:]]*=[[:space:]]*/,""); print; exit}' "$build/objs/Makefile")
          incs=$(awk '/^ALL_INCS[[:space:]]*=/{found=1} found{line=$0; sub(/^ALL_INCS[[:space:]]*=[[:space:]]*/,"",line); continued=(line ~ /\\$/); gsub(/\\$/, "", line); printf "%s ", line; if (!continued) exit}' "$build/objs/Makefile")
          # shellcheck disable=SC2086
          (
            cd "$build"
            "${{ matrix.cc }}" -c -fPIC $cflags \
              -Wall -Wextra -Wshadow -Wstrict-prototypes \
              -Wstrict-aliasing -Wunreachable-code -Werror \
              -Wno-unused-parameter \
              -I "$GITHUB_WORKSPACE" \
              $incs "$GITHUB_WORKSPACE/ngx_http_strip_filter_module.c" \
              -o /tmp/module_wrapper.o
            "${{ matrix.cc }}" -c $cflags \
              -Wall -Wextra -Wshadow -Wstrict-prototypes \
              -Wstrict-aliasing -Wunreachable-code -Werror \
              -Wno-unused-parameter \
              "$GITHUB_WORKSPACE/strip_core.c" \
              -o /tmp/module_core.o
          )

      - name: Stage artifact
        if: matrix.primary
        run: |
          mkdir artifact
          cp ".build/nginx-${NGINX_VERSION}/objs/nginx" artifact/
          cp ".build/nginx-${NGINX_VERSION}/objs/ngx_http_strip_filter_module.so" artifact/

      - name: Upload nginx artifact
        if: matrix.primary
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: nginx-mainline
          path: artifact/
          retention-days: 1

  test-nginx:
    name: Test::Nginx
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download nginx artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: nginx-mainline
          path: nginx-bin

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cpanminus libio-socket-ssl-perl
          sudo cpanm --notest --quiet Test::Nginx

      - name: Run Test::Nginx suite
        env:
          TEST_NGINX_BINARY: ${{ github.workspace }}/nginx-bin/nginx
          TEST_NGINX_LOAD_MODULES: ${{ github.workspace }}/nginx-bin/ngx_http_strip_filter_module.so
        run: |
          chmod +x nginx-bin/nginx
          prove -v t/

  asan:
    name: ASan and UBSan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libpcre2-dev zlib1g-dev cpanminus \
            libio-socket-ssl-perl
          sudo cpanm --notest --quiet Test::Nginx

      - name: Build with sanitizers
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION" asan

      - name: Run Test::Nginx suite under ASan and UBSan
        env:
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          TEST_NGINX_BINARY: ${{ github.workspace }}/.build/nginx-${{ env.NGINX_VERSION }}/objs/nginx
          TEST_NGINX_LOAD_MODULES: ${{ github.workspace }}/.build/nginx-${{ env.NGINX_VERSION }}/objs/ngx_http_strip_filter_module.so
        run: prove -v t/
