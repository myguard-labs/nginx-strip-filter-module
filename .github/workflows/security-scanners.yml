name: Security Scanners

on:
  schedule:
    - cron: "17 4 1 * *"
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secure:
    name: Secure
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flawfinder clang-tidy python3 python3-pip nginx-dev

      - name: Cache pip (semgrep)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: pip-semgrep-${{ runner.os }}

      - name: Install semgrep
        run: pip3 install --quiet semgrep

      - name: Generate nginx-dev headers (for clang-tidy)
        run: |
          cd /usr/share/nginx/src
          CC=gcc ./configure --with-compat --add-dynamic-module="$GITHUB_WORKSPACE" > /dev/null 2>&1 || true

      - name: flawfinder
        run: |
          flawfinder --minlevel=1 --sarif \
            "$GITHUB_WORKSPACE/ngx_http_strip_filter_module.c" \
            "$GITHUB_WORKSPACE/strip_core.c" \
            > flawfinder.sarif 2>/dev/null || true
          flawfinder --minlevel=1 \
            "$GITHUB_WORKSPACE/ngx_http_strip_filter_module.c" \
            "$GITHUB_WORKSPACE/strip_core.c" \
            2>&1 | tee flawfinder.log
          if flawfinder --minlevel=4 --quiet \
               "$GITHUB_WORKSPACE/ngx_http_strip_filter_module.c" \
               "$GITHUB_WORKSPACE/strip_core.c" \
               2>/dev/null | grep -Eq 'Hits = [1-9]'; then
            echo "✗ flawfinder: high-severity (>=4) findings" >&2
            exit 1
          fi

      - name: Upload flawfinder SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: flawfinder.sarif
          category: flawfinder
        continue-on-error: true

      - name: clang-tidy
        run: |
          NGINX_OBJS=/usr/share/nginx/src/objs
          NGINX_INC=$(dpkg -L nginx-dev 2>/dev/null | grep 'ngx_config.h' | head -1 | xargs dirname || echo /usr/include/nginx)
          INCS="-I$NGINX_INC -I$NGINX_OBJS -I$GITHUB_WORKSPACE"
          # INCS is a flag list that must word-split.
          # shellcheck disable=SC2086
          clang-tidy "$GITHUB_WORKSPACE/strip_core.c" \
            --checks='cert-*,clang-analyzer-security.*,clang-analyzer-unix.*,bugprone-*' \
            --warnings-as-errors='' \
            -- $INCS 2>&1 | tee clang-tidy.log || true
          # shellcheck disable=SC2086
          clang-tidy "$GITHUB_WORKSPACE/ngx_http_strip_filter_module.c" \
            --checks='cert-*,clang-analyzer-security.*,clang-analyzer-unix.*,bugprone-*' \
            --warnings-as-errors='' \
            -- $INCS 2>&1 | tee -a clang-tidy.log || true

      - name: semgrep
        run: |
          semgrep scan \
            --config "p/c" \
            --config "p/security-audit" \
            --sarif --output semgrep.sarif \
            "$GITHUB_WORKSPACE/strip_core.c" \
            "$GITHUB_WORKSPACE/ngx_http_strip_filter_module.c" \
            2>&1 | tee semgrep.log || true

      - name: Upload semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: security-reports
          path: |
            ${{ github.workspace }}/flawfinder.log
            ${{ github.workspace }}/flawfinder.sarif
            ${{ github.workspace }}/clang-tidy.log
            ${{ github.workspace }}/semgrep.log
            ${{ github.workspace }}/semgrep.sarif
          retention-days: 14
