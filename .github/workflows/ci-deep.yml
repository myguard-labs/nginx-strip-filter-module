name: CI Deep

# Exhaustive dynamic analysis — monthly cron + on-demand only, NEVER on PR.
# Consolidates the old fuzzing.yml + valgrind.yml + helgrind.yml +
# security-scanners.yml into one workflow. codeql.yml is dropped entirely:
# CodeQL / the GitHub Security tab is GitHub-Advanced-Security only and does
# nothing on a private repo, so the SARIF-upload path is removed too — the
# scanners still run and GATE on findings, they just don't upload.
#
# Jobs: fuzz (all 6 kinds, 14400s/target) · memcheck soak · helgrind soak ·
# scanners.
#   * memcheck AND helgrind run the Test::Nginx t/ suite under valgrind (the
#     module ships a real filter, so t/ exercises a live nginx worker). BOTH
#     pass --suppressions=tools/valgrind.supp; both pass --error-exitcode=99
#     (helgrind additionally — a detected race MUST fail the job).
#
# Action pins (keep in sync with build-test.yml header):
# actions/checkout@v5        -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/upload-artifact@v5 -> 330a01c490aca151604b8cf639adc76d48f6c5d4
# actions/cache@v4           -> 0057852bfaa89a56745cba8c7296529d2fc39830

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.1"

on:
  schedule:
    # Monthly, 1st @ 03:30 UTC.
    - cron: "30 3 1 * *"
  workflow_dispatch:
    inputs:
      fuzz_seconds:
        description: "Per-target fuzz duration (seconds)"
        required: false
        default: "14400"

concurrency:
  group: ci-deep-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz (all 6 kinds, long)
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 600
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install clang + libFuzzer
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Select fuzz duration
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "FUZZ_SECS=${{ github.event.inputs.fuzz_seconds }}" >> "$GITHUB_ENV"
          else
            echo "FUZZ_SECS=14400" >> "$GITHUB_ENV"
          fi

      - name: Build fuzz targets
        run: bash fuzz/build.sh "$GITHUB_WORKSPACE/fuzz"

      - name: Fuzz each target
        run: |
          set -euo pipefail
          cd fuzz
          for k in html css js json svg xml; do
            echo "::group::fuzz_strip_${k}"
            set +e
            ./"fuzz_strip_${k}" \
              -max_total_time="$FUZZ_SECS" \
              -dict="fuzz.dict.${k}" \
              -print_final_stats=1 \
              -artifact_prefix="crash-${k}-" \
              "corpus_${k}/"
            rc=$?
            set -e
            [ $rc -eq 0 ] || { echo "❌ fuzz_strip_${k} crash (exit $rc)"; exit 1; }
            mkdir -p "corpus_${k}-min"
            ./"fuzz_strip_${k}" -merge=1 "corpus_${k}-min/" "corpus_${k}/"
            echo "merged ${k}: $(find "corpus_${k}-min" -type f | wc -l) units"
            echo "::endgroup::"
            echo "✓ fuzz_strip_${k}: no crashes in ${FUZZ_SECS}s"
          done

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-deep-crashes
          path: ${{ github.workspace }}/fuzz/crash-*
          retention-days: 30

      - name: Upload minimized corpus
        if: success()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-corpus
          path: ${{ github.workspace }}/fuzz/corpus_*-min
          retention-days: 30

      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — CI Deep / fuzz FAILED. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

  memcheck:
    name: Valgrind Memcheck soak
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 240
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libpcre2-dev valgrind zlib1g-dev \
            cpanminus libio-socket-ssl-perl
          sudo cpanm --notest --quiet Test::Nginx

      - name: Cache source tarball
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .build/nginx-${{ env.NGINX_VERSION }}.tar.gz
          key: src-nginx-${{ env.NGINX_VERSION }}

      - name: Build debug server and module
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION" debug

      - name: Run Test::Nginx suite under Memcheck (WITH suppressions)
        env:
          # Test::Nginx still probes PATH for an `nginx` even when
          # TEST_NGINX_BINARY is set to the valgrind wrapper — put the built
          # binary on PATH so its "Cannot find the nginx executable" check passes.
          PATH: ${{ github.workspace }}/.build/nginx-${{ env.NGINX_VERSION }}/objs:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          TEST_NGINX_BINARY: >-
            valgrind --tool=memcheck --track-origins=yes --leak-check=full
            --show-leak-kinds=definite,indirect
            --errors-for-leak-kinds=definite,indirect --error-exitcode=99
            --suppressions=${{ github.workspace }}/tools/valgrind.supp
            --log-file=${{ github.workspace }}/valgrind-%p.log
            ${{ github.workspace }}/.build/nginx-${{ env.NGINX_VERSION }}/objs/nginx
          TEST_NGINX_LOAD_MODULES: >-
            ${{ github.workspace }}/.build/nginx-${{ env.NGINX_VERSION }}/objs/ngx_http_strip_filter_module.so
          TEST_NGINX_SLEEP: 2
        run: prove -v t/

      - name: Verify Memcheck reports
        if: always()
        run: |
          cat valgrind-*.log || true
          if grep -Eq 'ERROR SUMMARY: [1-9][0-9]* errors' valgrind-*.log 2>/dev/null; then
            exit 1
          fi

      - name: Upload Memcheck reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: memcheck-reports
          path: valgrind-*.log
          retention-days: 14

      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — CI Deep / memcheck FAILED. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

  helgrind:
    name: Valgrind Helgrind soak
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 240
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libpcre2-dev valgrind zlib1g-dev \
            cpanminus libio-socket-ssl-perl
          sudo cpanm --notest --quiet Test::Nginx

      - name: Cache source tarball
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .build/nginx-${{ env.NGINX_VERSION }}.tar.gz
          key: src-nginx-${{ env.NGINX_VERSION }}

      - name: Build debug server and module
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION" debug

      - name: Run Test::Nginx suite under Helgrind (--error-exitcode=99, WITH suppressions)
        env:
          # Test::Nginx still probes PATH for an `nginx` even when
          # TEST_NGINX_BINARY is set to the valgrind wrapper — put the built
          # binary on PATH so its "Cannot find the nginx executable" check passes.
          PATH: ${{ github.workspace }}/.build/nginx-${{ env.NGINX_VERSION }}/objs:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          TEST_NGINX_BINARY: >-
            valgrind --tool=helgrind --error-exitcode=99
            --suppressions=${{ github.workspace }}/tools/valgrind.supp
            --log-file=${{ github.workspace }}/helgrind-%p.log
            ${{ github.workspace }}/.build/nginx-${{ env.NGINX_VERSION }}/objs/nginx
          TEST_NGINX_LOAD_MODULES: >-
            ${{ github.workspace }}/.build/nginx-${{ env.NGINX_VERSION }}/objs/ngx_http_strip_filter_module.so
          TEST_NGINX_SLEEP: 2
        run: prove -v t/

      - name: Verify Helgrind reports
        if: always()
        run: |
          cat helgrind-*.log || true
          if grep -Eq 'ERROR SUMMARY: [1-9][0-9]* errors' helgrind-*.log 2>/dev/null; then
            exit 1
          fi

      - name: Upload Helgrind reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: helgrind-reports
          path: helgrind-*.log
          retention-days: 14

      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — CI Deep / helgrind FAILED. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

  scanners:
    name: Security scanners
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flawfinder clang-tidy python3 python3-pip nginx-dev
          pip3 install --quiet semgrep
      - name: Configure nginx src tree (clang-tidy headers)
        run: |
          set -euo pipefail
          wget -q "https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz"
          tar -xzf "nginx-${NGINX_VERSION}.tar.gz"; cd "nginx-${NGINX_VERSION}"
          CC=gcc ./configure --with-compat --add-dynamic-module="$GITHUB_WORKSPACE" >/dev/null
          echo "NGINX_SRC_TREE=$PWD" >> "$GITHUB_ENV"
      - name: flawfinder
        run: |
          flawfinder --minlevel=1 \
            "$GITHUB_WORKSPACE/ngx_http_strip_filter_module.c" \
            "$GITHUB_WORKSPACE/strip_core.c" 2>&1 | tee flawfinder.log
          if flawfinder --minlevel=4 --quiet \
               "$GITHUB_WORKSPACE/ngx_http_strip_filter_module.c" \
               "$GITHUB_WORKSPACE/strip_core.c" 2>/dev/null | grep -Eq 'Hits = [1-9]'; then
            echo "✗ flawfinder: high-severity (>=4) findings" >&2
            exit 1
          fi
      - name: clang-tidy (cert-*, security.*)
        run: |
          set -euo pipefail
          N="$NGINX_SRC_TREE"
          INCLUDES="-I$N/src/core -I$N/src/event -I$N/src/event/modules -I$N/src/event/quic \
            -I$N/src/os/unix -I$N/objs -I$N/src/http -I$N/src/http/modules -I$N/src/http/v2 \
            -I$GITHUB_WORKSPACE -I/usr/include"
          status=0
          for f in \
            "$GITHUB_WORKSPACE/strip_core.c" \
            "$GITHUB_WORKSPACE/ngx_http_strip_filter_module.c"; do
            # shellcheck disable=SC2086
            clang-tidy "$f" \
              --checks='-*,cert-*,clang-analyzer-security.*,-clang-analyzer-security.insecureAPI.DeprecatedOrUnsafeBufferHandling' \
              --warnings-as-errors='*' -- $INCLUDES 2>&1 | tee -a clang-tidy.log || status=1
          done
          exit "$status"
      - name: semgrep
        run: |
          semgrep scan --config p/c --config p/security-audit \
            "$GITHUB_WORKSPACE/strip_core.c" \
            "$GITHUB_WORKSPACE/ngx_http_strip_filter_module.c" 2>&1 | tee semgrep.log || true
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: security-reports
          path: |
            ${{ github.workspace }}/flawfinder.log
            ${{ github.workspace }}/clang-tidy.log
            ${{ github.workspace }}/semgrep.log
          retention-days: 14
