name: Fuzzing

on:
  schedule:
    - cron: "41 3 1 * *"
  workflow_dispatch:
    inputs:
      duration:
        description: "Fuzz duration in seconds"
        required: false
        default: "900"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    name: strip_core fuzz
    runs-on: [self-hosted, builder02, lxc]
    # WIDE+LONG monthly discovery on self-hosted (free, no GitHub 6h cap) —
    # replaces the local nginx-module-stress cron. 6 targets x 2400s = ~4h.
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install clang + libFuzzer
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Build fuzz targets
        run: bash fuzz/build.sh "$GITHUB_WORKSPACE/fuzz"

      - name: Select fuzz duration
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "FUZZ_SECS=120" >> "$GITHUB_ENV"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DURATION="${{ github.event.inputs.duration }}"
            echo "FUZZ_SECS=${DURATION}" >> "$GITHUB_ENV"
          else
            # Monthly self-hosted budget: each of the 6 kinds gets the full
            # FUZZ_SECS, so 6 targets x 2400s = ~4h (14400s)/module.
            echo "FUZZ_SECS=2400" >> "$GITHUB_ENV"
          fi

      - name: Run fuzzers
        run: |
          cd fuzz
          for kind in html css js json svg xml; do
            echo "=== fuzz_strip_${kind} (${FUZZ_SECS}s) ==="
            set +e
            "./fuzz_strip_${kind}" \
              -max_total_time="$FUZZ_SECS" \
              -print_final_stats=1 \
              -artifact_prefix="crash-${kind}-" \
              "corpus_${kind}/"
            rc=$?
            set -e
            if [ $rc -ne 0 ]; then
              echo "❌ fuzz_strip_${kind} found a crash (exit $rc)"
              exit 1
            fi
            echo "✓ fuzz_strip_${kind}: no crashes in ${FUZZ_SECS}s"
          done

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-crashes
          path: fuzz/crash-*
          retention-days: 30

      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST \
            -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — ${{ github.workflow }} FAILED (scheduled). ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
