name: Fuzzing

# Fast fuzz regression gate on every PR/push — 20s/target on all 6 strip
# kinds (html/css/js/json/svg/xml). Long fuzz discovery lives in ci-deep.yml
# (monthly cron + workflow_dispatch).
#
# Action pins (keep in sync with build-test.yml header):
# actions/checkout@v5        -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/upload-artifact@v5 -> 330a01c490aca151604b8cf639adc76d48f6c5d4

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.1"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: fuzzing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz-regression:
    name: Fuzz regression (20s/target)
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 30
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install clang + libFuzzer
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Build fuzz targets
        run: bash fuzz/build.sh "$GITHUB_WORKSPACE/fuzz"

      - name: Run each target 20s
        run: |
          set -euo pipefail
          cd fuzz
          for k in html css js json svg xml; do
            echo "::group::fuzz_strip_${k}"
            set +e
            ./"fuzz_strip_${k}" \
              -max_total_time=20 \
              -dict="fuzz.dict.${k}" \
              -print_final_stats=1 \
              -artifact_prefix="crash-${k}-" \
              "corpus_${k}/"
            rc=$?
            set -e
            [ $rc -eq 0 ] || { echo "❌ fuzz_strip_${k} crash (exit $rc)"; exit 1; }
            echo "::endgroup::"
            echo "✓ fuzz_strip_${k}: no crashes in 20s"
          done

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-fast-crashes
          path: ${{ github.workspace }}/fuzz/crash-*
          retention-days: 14
