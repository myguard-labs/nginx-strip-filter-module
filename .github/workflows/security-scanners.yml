name: Security scanners

# Static / security scanners gate on every PR/push — flawfinder, clang-tidy
# (cert-*, security.*) and semgrep over the module sources. Same job as the
# ci-deep.yml scanners job, promoted to a PR gate.
#
# Action pins (keep in sync with build-test.yml header):
# actions/checkout@v5        -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/upload-artifact@v5 -> 330a01c490aca151604b8cf639adc76d48f6c5d4

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # The scanners job configures a real nginx source tree for clang-tidy headers.
  NGINX_VERSION: "1.31.1"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: security-scanners-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scanners:
    name: Security scanners
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 20
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flawfinder clang-tidy python3 python3-pip pipx nginx-dev
          # semgrep: isolate via pipx (PEP 668 blocks a bare pip3 install into the
          # system Python on the Ubuntu 24.04 self-hosted runner). Fall back to a
          # user pip install with --break-system-packages if pipx is unavailable.
          if command -v pipx >/dev/null; then
            pipx install --quiet semgrep
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          else
            pip3 install --quiet --user --break-system-packages semgrep
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
      - name: Configure nginx src tree (clang-tidy headers)
        run: |
          set -euo pipefail
          wget -q "https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz"
          tar -xzf "nginx-${NGINX_VERSION}.tar.gz"; cd "nginx-${NGINX_VERSION}"
          CC=gcc ./configure --with-compat --add-dynamic-module="$GITHUB_WORKSPACE" >/dev/null
          echo "NGINX_SRC_TREE=$PWD" >> "$GITHUB_ENV"
      - name: flawfinder
        run: |
          flawfinder --minlevel=1 \
            "$GITHUB_WORKSPACE/ngx_http_strip_filter_module.c" \
            "$GITHUB_WORKSPACE/strip_core.c" 2>&1 | tee flawfinder.log
          if flawfinder --minlevel=4 --quiet \
               "$GITHUB_WORKSPACE/ngx_http_strip_filter_module.c" \
               "$GITHUB_WORKSPACE/strip_core.c" 2>/dev/null | grep -Eq 'Hits = [1-9]'; then
            echo "✗ flawfinder: high-severity (>=4) findings" >&2
            exit 1
          fi
      - name: clang-tidy (cert-*, security.*)
        run: |
          set -euo pipefail
          N="$NGINX_SRC_TREE"
          INCLUDES="-I$N/src/core -I$N/src/event -I$N/src/event/modules -I$N/src/event/quic \
            -I$N/src/os/unix -I$N/objs -I$N/src/http -I$N/src/http/modules -I$N/src/http/v2 \
            -I$GITHUB_WORKSPACE -I/usr/include"
          status=0
          for f in \
            "$GITHUB_WORKSPACE/strip_core.c" \
            "$GITHUB_WORKSPACE/ngx_http_strip_filter_module.c"; do
            # shellcheck disable=SC2086
            clang-tidy "$f" \
              --checks='-*,cert-*,clang-analyzer-security.*,-clang-analyzer-security.insecureAPI.DeprecatedOrUnsafeBufferHandling' \
              --warnings-as-errors='*' -- $INCLUDES 2>&1 | tee -a clang-tidy.log || status=1
          done
          exit "$status"
      - name: semgrep
        run: |
          semgrep scan --config p/c --config p/security-audit \
            "$GITHUB_WORKSPACE/strip_core.c" \
            "$GITHUB_WORKSPACE/ngx_http_strip_filter_module.c" 2>&1 | tee semgrep.log || true
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: security-reports
          path: |
            ${{ github.workspace }}/flawfinder.log
            ${{ github.workspace }}/clang-tidy.log
            ${{ github.workspace }}/semgrep.log
          retention-days: 14
