name: Valgrind

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.1"

on:
  schedule:
    - cron: "30 3 1 * *"
  workflow_dispatch: {}

concurrency:
  group: valgrind-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  memcheck:
    name: Memcheck
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libpcre2-dev valgrind zlib1g-dev \
            cpanminus libio-socket-ssl-perl
          sudo cpanm --notest --quiet Test::Nginx

      - name: Cache source tarball
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .build/nginx-${{ env.NGINX_VERSION }}.tar.gz
          key: src-nginx-${{ env.NGINX_VERSION }}

      - name: Build debug server and module
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION" debug

      - name: Run Test::Nginx suite under Memcheck
        env:
          TEST_NGINX_BINARY: >-
            valgrind --tool=memcheck --track-origins=yes --leak-check=full
            --show-leak-kinds=definite,indirect
            --errors-for-leak-kinds=definite,indirect --error-exitcode=99
            --suppressions=${{ github.workspace }}/tools/valgrind.supp
            --log-file=${{ github.workspace }}/valgrind-%p.log
            ${{ github.workspace }}/.build/nginx-${{ env.NGINX_VERSION }}/objs/nginx
          TEST_NGINX_LOAD_MODULES: >-
            ${{ github.workspace }}/.build/nginx-${{ env.NGINX_VERSION }}/objs/ngx_http_strip_filter_module.so
          TEST_NGINX_SLEEP: 2
        run: prove -v t/

      - name: Verify Memcheck reports
        if: always()
        run: |
          cat valgrind-*.log || true
          if grep -Eq 'ERROR SUMMARY: [1-9][0-9]* errors' valgrind-*.log 2>/dev/null; then
            exit 1
          fi

      - name: Upload Memcheck reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: valgrind-reports
          path: valgrind-*.log
          retention-days: 14
