name: Helgrind

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.1"

on:
  schedule:
    - cron: "30 4 1 * *"
  workflow_dispatch: {}

concurrency:
  group: helgrind-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  helgrind:
    name: Helgrind
    runs-on: [self-hosted, builder02, lxc]
    # Long monthly helgrind soak on self-hosted — no GitHub 6h cap.
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libpcre2-dev valgrind zlib1g-dev \
            cpanminus libio-socket-ssl-perl
          sudo cpanm --notest --quiet Test::Nginx

      - name: Cache source tarball
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .build/nginx-${{ env.NGINX_VERSION }}.tar.gz
          key: src-nginx-${{ env.NGINX_VERSION }}

      - name: Build debug server and module
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION" debug

      - name: Run Test::Nginx suite under Helgrind
        env:
          TEST_NGINX_BINARY: >-
            valgrind --tool=helgrind --error-exitcode=99
            --suppressions=${{ github.workspace }}/tools/valgrind.supp
            --log-file=${{ github.workspace }}/helgrind-%p.log
            ${{ github.workspace }}/.build/nginx-${{ env.NGINX_VERSION }}/objs/nginx
          TEST_NGINX_LOAD_MODULES: >-
            ${{ github.workspace }}/.build/nginx-${{ env.NGINX_VERSION }}/objs/ngx_http_strip_filter_module.so
          TEST_NGINX_SLEEP: 2
        run: prove -v t/

      - name: Verify Helgrind reports
        if: always()
        run: |
          cat helgrind-*.log || true
          if grep -Eq 'ERROR SUMMARY: [1-9][0-9]* errors' helgrind-*.log 2>/dev/null; then
            exit 1
          fi

      - name: Upload Helgrind reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: helgrind-reports
          path: helgrind-*.log
          retention-days: 14

      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST \
            -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — ${{ github.workflow }} FAILED (scheduled). ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
